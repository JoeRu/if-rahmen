
services:
  immichframe:
    container_name: immichframe
    build:
#      context: ./.worktree/fix-build-warnings
      context: ./ImmichFrame
#    image: immichframe:latest
#    image: ghcr.io/immichframe/immichframe:latest
    restart: unless-stopped
    volumes:
      - ./Config-IF:/app/Config
      - ./Config-IF/custom.css:/app/wwwroot/static/custom.css
#      - ./Config-IF/test.txt:/app/wwwroot/static/test.txt
    ports:
      - "2284:8080"
    environment:
      TZ: "Europe/Berlin"


